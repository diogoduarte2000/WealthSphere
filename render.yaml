services:
  - type: web
    name: wealthsphere-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        value: https://wealthsphere-backend.onrender.com
      - key: FRONTEND_URL
        value: https://wealth-sphere-eblw8c1kq-diogosilvanoduarte-3890s-projects.vercel.app
      - key: SESSION_SECRET
        generateValue: true
      - key: STEAM_API_KEY
        sync: false
