version: '3.8'

services:
  # MongoDB service
  mongodb:
    image: mongo:6
    container_name: wealthsphere-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: wealthsphere
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - wealthsphere-network

  # Backend API service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wealthsphere-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/wealthsphere?authSource=admin
      JWT_SECRET: wealthsphere-secret-key-change-in-production
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - wealthsphere-network

  # Frontend service (optional, if you want to serve Angular app)
  frontend:
    image: nginx:alpine
    container_name: wealthsphere-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist/wealthsphere:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - wealthsphere-network

volumes:
  mongodb_data:
    driver: local

networks:
  wealthsphere-network:
    driver: bridge
